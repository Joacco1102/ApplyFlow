<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ApplyFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-briefcase-fill me-2"></i>ApplyFlow</a>
            <button class="btn btn-light btn-sm" data-bs-toggle="modal" data-bs-target="#jobModal">
                <i class="bi bi-plus-circle"></i> Registrar Postulación
            </button>
        </div>
    </nav>

    <div class="container py-4">

        <div class="row g-3 mb-4">

            <div class="col-lg-3 col-md-6">
                <div class="card dashboard-card">
                    <div class="card-body">
                        <p>Total</p>
                        <h3 id="lblTotal">0</h3>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card dashboard-card">
                    <div class="card-body">
                        <p>En Proceso</p>
                        <h3 id="lblProceso">0</h3>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card dashboard-card">
                    <div class="card-body">
                        <p>Entrevistas</p>
                        <h3 id="lblEntrevistas">0</h3>
                    </div>
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <div class="card dashboard-card">
                    <div class="card-body">
                        <p>Ofertas</p>
                        <h3 id="lblOfertas">0</h3>
                    </div>
                </div>
            </div>

        </div>

        <div class="card shadow-sm">

            <div class="card-header bg-white">

                <div class="row g-2">

                    <div class="col-lg-4">
                        <input type="text" class="form-control" id="txtBuscar" placeholder="Buscar empresa o cargo...">
                    </div>

                    <div class="col-lg-3">
                        <select class="form-select" id="cmbEstado">
                            <option value="">Todos los estados</option>
                            <option>Encontrada</option>
                            <option>Postulado</option>
                            <option>CV Visto</option>
                            <option>Prueba Técnica</option>
                            <option>RRHH</option>
                            <option>Entrevista Técnica</option>
                            <option>Entrevista Final</option>
                            <option>Oferta</option>
                            <option>Contratado</option>
                            <option>Rechazado</option>
                        </select>
                    </div>

                    <div class="col-lg-3">
                        <select class="form-select" id="cmbPortal">
                            <option value="">Todos los portales</option>
                            <option>LinkedIn</option>
                            <option>Indeed</option>
                            <option>Computrabajo</option>
                            <option>Boomerang</option>
                            <option>Otro</option>
                        </select>
                    </div>

                    <div class="col-lg-2">
                        <button class="btn btn-outline-secondary w-100" id="btnLimpiar">
                            <i class="bi bi-arrow-clockwise"></i>
                        </button>
                    </div>

                </div>

            </div>

            <div class="card-body p-0">

                <table class="table table-hover align-middle mb-0">

                    <thead>

                        <tr>
                            <th>Empresa</th>
                            <th>Cargo</th>
                            <th>Estado</th>
                            <th>Portal</th>
                            <th>Fecha</th>
                            <th width="120">Acciones</th>
                        </tr>

                    </thead>

                    <tbody id="tbodyJobs">

                        <tr>
                            <td colspan="6" class="text-center text-muted py-5">
                                No existen postulaciones registradas.
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- Modal -->

    <div class="modal fade" id="jobModal">

        <div class="modal-dialog modal-xl modal-dialog-scrollable">

            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-pencil-square me-2"></i>
                        Detalle de la Postulación
                    </h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <form id="frmJob">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Empresa</label>
                                <input type="text" class="form-control" id="empresa" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Cargo</label>
                                <input type="text" class="form-control" id="cargo" required>
                            </div>

                            <div class="col-md-3 mb-3">
                                <label class="form-label">Fecha</label>
                                <input type="date" class="form-control" id="fecha">
                            </div>

                            <div class="col-md-3 mb-3">
                                <label class="form-label">Portal</label>
                                <select class="form-select" id="portal">
                                    <option>LinkedIn</option>
                                    <option>Indeed</option>
                                    <option>Computrabajo</option>
                                    <option>Boomerang</option>
                                    <option>Otro</option>
                                </select>
                            </div>

                            <div class="col-md-3 mb-3">
                                <label class="form-label">Modalidad</label>
                                <select class="form-select" id="modalidad">
                                    <option>Presencial</option>
                                    <option>Híbrido</option>
                                    <option>Remoto</option>
                                </select>
                            </div>

                            <div class="col-md-3 mb-3">
                                <label class="form-label">CV Utilizado</label>
                                <select class="form-select" id="cv">
                                    <option>Data</option>
                                    <option>Finanzas</option>
                                    <option>Almacén</option>
                                    <option>Funcional</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Estado</label>
                                <select class="form-select" id="estado">
                                    <option>Encontrada</option>
                                    <option>Postulado</option>
                                    <option>CV Visto</option>
                                    <option>Prueba Técnica</option>
                                    <option>RRHH</option>
                                    <option>Entrevista Técnica</option>
                                    <option>Entrevista Final</option>
                                    <option>Oferta</option>
                                    <option>Contratado</option>
                                    <option>Rechazado</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">URL Vacante (Opcional)</label>
                                <input type="url" class="form-control" id="url">
                            </div>

                            <div class="col-12 mb-3">
                                <label class="form-label">Descripción del Puesto</label>
                                <textarea class="form-control auto-grow" rows="5" id="descripcion"></textarea>
                            </div>

                            <div class="col-12 mb-3">
                                <label class="form-label">Seguimiento</label>
                                <textarea class="form-control auto-grow" rows="5" id="seguimiento"></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Notas</label>
                                <textarea class="form-control auto-grow" rows="4" id="notas"></textarea>
                            </div>

                        </div>

                    </form>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" id="btnGuardar">
                        <i class="bi bi-floppy"></i>
                        Guardar
                    </button>
                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
