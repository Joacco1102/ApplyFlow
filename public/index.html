<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApplyFlow</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fa-solid fa-briefcase me-2"></i>ApplyFlow
            </span>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalPostulacion" id="btnNuevo">
                <i class="fa-solid fa-plus me-1"></i>Registrar Postulación
            </button>
        </div>
    </nav>

    <div class="container pb-5">

        <!-- DASHBOARD -->
        <div class="row g-3 mb-4" id="dashboard">
            <div class="col-6 col-md-4">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <div class="fs-3 fw-bold" id="statTotal">0</div>
                        <div class="text-muted small text-uppercase">Total</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <div class="fs-3 fw-bold text-primary" id="statPendientes">0</div>
                        <div class="text-muted small text-uppercase">Pendientes</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="card text-center shadow-sm">
                    <div class="card-body">
                        <div class="fs-3 fw-bold text-danger" id="statRechazadas">0</div>
                        <div class="text-muted small text-uppercase">Rechazadas</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- FILTROS -->
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label small">Buscar</label>
                        <input type="text" class="form-control" id="fBuscar" placeholder="Empresa o cargo...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Estado</label>
                        <select class="form-select" id="fEstado">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Portal</label>
                        <select class="form-select" id="fPortal">
                            <option value="">Todos</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-secondary w-100" id="btnLimpiarFiltros">
                            <i class="fa-solid fa-broom me-1"></i>Limpiar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TABLA -->
        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Empresa</th>
                            <th>Cargo</th>
                            <th>Estado</th>
                            <th>Portal</th>
                            <th>Fecha</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyPostulaciones"></tbody>
                </table>
            </div>
            <div id="emptyState" class="text-center text-muted py-5" style="display:none;">
                <i class="fa-regular fa-folder-open fs-2 d-block mb-2"></i>
                No hay postulaciones registradas.
            </div>
        </div>

    </div>

    <!-- MODAL -->
    <div class="modal fade" id="modalPostulacion" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitulo">Registrar Postulación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formPostulacion">
                        <input type="hidden" id="mId">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Empresa *</label>
                                <input type="text" class="form-control" id="mEmpresa" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Cargo *</label>
                                <input type="text" class="form-control" id="mCargo" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Portal</label>
                                <select class="form-select" id="mPortal"></select>
                                <input type="text" class="form-control mt-2" id="mPortalOtro"
                                    placeholder="Escribe el nuevo portal" style="display:none;">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Estado</label>
                                <select class="form-select" id="mEstado"></select>
                                <input type="text" class="form-control mt-2" id="mEstadoOtro"
                                    placeholder="Escribe el nuevo estado" style="display:none;">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">CV Utilizado</label>
                                <input type="text" class="form-control" id="mCV" list="dlCV">
                                <datalist id="dlCV"></datalist>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Modalidad</label>
                                <select class="form-select" id="mModalidad">
                                    <option>Presencial</option>
                                    <option>Híbrido</option>
                                    <option>Remoto</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Fecha</label>
                                <input type="date" class="form-control" id="mFecha">
                            </div>

                            <div class="col-12">
                                <label class="form-label">Enlace de la publicación</label>
                                <input type="url" class="form-control" id="mEnlace" placeholder="https://...">
                            </div>

                            <div class="col-12">
                                <label class="form-label">Descripción del puesto</label>
                                <textarea class="form-control" id="mDescripcion" rows="4"></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Notas</label>
                                <textarea class="form-control" id="mNotas" rows="3"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" id="btnGuardar">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
